<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Device Portal — Sign In</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>[x-cloak]{display:none}</style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center px-4">

  <div class="w-full max-w-sm" x-data="{
    query: '',
    open: false,
    selected: null,
    users: [
      { name: 'Alice Johnson',  email: 'alice@zededa.com',  team: 'PLATFORM', role: 'Admin',  color: 'bg-blue-600',   initial: 'A', href: 'admin_index.html' },
      { name: 'Bob Smith',      email: 'bob@zededa.com',    team: 'ST',       role: 'Member', color: 'bg-emerald-500', initial: 'B', href: 'index.html' },
      { name: 'Carol Martinez', email: 'carol@zededa.com',  team: 'PLATFORM', role: 'Member', color: 'bg-rose-500',    initial: 'C', href: 'index.html' },
      { name: 'Charlie Brown',  email: 'charlie@zededa.com',team: 'EVE',      role: 'Member', color: 'bg-violet-500',  initial: 'C', href: 'index.html' }
    ],
    get filtered() {
      const q = this.query.toLowerCase();
      if (!q) return this.users;
      return this.users.filter(u =>
        u.name.toLowerCase().includes(q) || u.email.toLowerCase().includes(q)
      );
    },
    select(u) { this.selected = u; this.query = u.name; this.open = false; },
    clear() { this.selected = null; this.query = ''; this.open = true; }
  }">

    <!-- Logo + title -->
    <div class="text-center mb-8">
      <div class="w-14 h-14 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
        <span class="text-white text-xl font-bold">DP</span>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Device Portal</h1>
      <p class="text-sm text-gray-500 mt-1">Sign in to continue</p>
    </div>

    <!-- Sign-in card -->
    <div class="bg-white rounded-2xl shadow-xl border border-gray-200 p-6">
      <label class="block text-xs font-semibold text-gray-700 mb-1.5">Who are you?</label>

      <!-- Combobox -->
      <div class="relative">

        <!-- Selected user display / search input -->
        <div class="flex items-center gap-2 px-3 py-2.5 border border-gray-300 rounded-lg focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-transparent"
             :class="open ? 'ring-2 ring-blue-500 border-transparent' : ''">
          <!-- Avatar (shown when selected) -->
          <div x-show="selected" x-cloak
               class="w-6 h-6 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
               :class="selected?.color" x-text="selected?.initial"></div>
          <!-- Search input -->
          <input type="text"
                 x-model="query"
                 @focus="open = true"
                 @click.outside="open = false; if (!selected) query = ''"
                 @input="selected = null; open = true"
                 placeholder="Search by name or email…"
                 class="flex-1 text-sm outline-none min-w-0 bg-transparent">
          <!-- Clear button -->
          <button x-show="query" x-cloak @click="clear()"
                  class="text-gray-400 hover:text-gray-600 flex-shrink-0">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
            </svg>
          </button>
          <!-- Chevron -->
          <svg x-show="!query" class="w-4 h-4 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/>
          </svg>
        </div>

        <!-- Dropdown list -->
        <div x-show="open" x-cloak
             class="absolute z-20 w-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden">
          <template x-if="filtered.length">
            <div>
              <template x-for="u in filtered" :key="u.email">
                <button @click="select(u)"
                        class="w-full flex items-center gap-3 px-4 py-3 hover:bg-blue-50 transition-colors text-left"
                        :class="selected?.email === u.email ? 'bg-blue-50' : ''">
                  <div class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0"
                       :class="u.color" x-text="u.initial"></div>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-semibold text-gray-900" x-text="u.name"></p>
                    <p class="text-xs text-gray-400" x-text="u.email + ' · ' + u.team"></p>
                  </div>
                  <span class="text-xs px-2 py-0.5 rounded-full font-semibold flex-shrink-0"
                        :class="u.role === 'Admin' ? 'bg-purple-100 text-purple-700' : 'bg-gray-100 text-gray-600'"
                        x-text="u.role"></span>
                </button>
              </template>
            </div>
          </template>
          <p x-show="!filtered.length" class="px-4 py-3 text-sm text-gray-400 italic">No users found</p>
        </div>
      </div>

      <!-- Sign in button -->
      <a :href="selected ? selected.href : '#'"
         :class="selected ? 'bg-blue-600 hover:bg-blue-700 cursor-pointer' : 'bg-blue-200 cursor-not-allowed pointer-events-none'"
         class="mt-4 flex items-center justify-center w-full py-2.5 text-sm font-semibold text-white rounded-lg transition-colors">
        Sign in
      </a>
    </div>

    <p class="text-xs text-center text-gray-400 mt-6">
      No password required · internal tool on trusted network
    </p>

  </div>

</body>
</html>
