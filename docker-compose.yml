services:
  backend:
    build: ./backend
    env_file: ./backend/.env
    environment:
      - START_SCHEDULER=true
    volumes:
      - sqlite_data:/app/data
      - static_files:/app/static
      - ./logs:/app/logs
    expose:
      - "8000"

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    volumes:
      - static_files:/static
    depends_on:
      - backend

volumes:
  sqlite_data:
  static_files:
